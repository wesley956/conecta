<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cruz Stars Admin</title><style>body{margin:0;background:#080b12;color:#f8fafc;font-family:Arial,sans-serif}main{max-width:1180px;margin:auto;padding:24px}h1{margin:0 0 8px;font-size:34px}p{color:#94a3b8}.card{background:#111827;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:16px;margin:14px 0}input,select{background:#020617;color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:10px;width:100%}button{border:0;border-radius:10px;padding:10px 12px;font-weight:800;cursor:pointer;background:#1f2937;color:#fff}.orange{background:#f97316;color:#111827}.green{background:#14532d;color:#22c55e}.red{background:#7f1d1d;color:#fecaca}.cyan{background:#164e63;color:#22d3ee}.row{display:grid;grid-template-columns:1fr auto;gap:10px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}table{width:100%;border-collapse:collapse;margin-top:12px}th,td{border-bottom:1px solid rgba(255,255,255,.1);padding:10px;text-align:left;font-size:14px}th{color:#94a3b8}.mono{font-family:monospace;color:#22d3ee;font-weight:900}.msg{display:none;padding:12px;border-radius:12px;margin:12px 0}.ok{display:block;background:#052e16;color:#22c55e}.err{display:block;background:#450a0a;color:#fecaca}@media(max-width:800px){.row,.grid{grid-template-columns:1fr}.scroll{overflow:auto}table{min-width:900px}}</style></head><body><main><h1>Cruz Stars Admin</h1><p>Painel de controle para ativações, aparelhos e playlists.</p><section class="card"><h2>Acesso</h2><div class="row"><input id="token" type="password" placeholder="ADMIN_PANEL_TOKEN"><button class="orange" onclick="saveToken()">Entrar</button></div></section><div id="msg" class="msg"></div><section class="card"><h2>Nova playlist</h2><div class="grid"><input id="plName" placeholder="Nome da lista"><input id="plUrl" placeholder="URL M3U"><select id="plType"><option value="m3u">M3U</option><option value="xtream">Xtream</option><option value="stalker">Stalker</option></select><button class="orange" onclick="createPlaylist()">Cadastrar</button></div></section><section class="card"><div class="row"><h2>Aparelhos</h2><button class="cyan" onclick="loadAll()">Recarregar</button></div><div class="scroll"><table><thead><tr><th>Código</th><th>Cliente</th><th>Status</th><th>Lista</th><th>Vencimento</th><th>Ações</th></tr></thead><tbody id="devices"><tr><td colspan="6">Entre com o token.</td></tr></tbody></table></div></section></main><script>
const API='https://awauvkjkucjqulkklmuo.supabase.co/functions/v1/admin-panel';const KEY='roneca-admin-token';let devices=[],playlists=[];function $(id){return document.getElementById(id)}function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function msg(t,ok=true){$('msg').className='msg '+(ok?'ok':'err');$('msg').textContent=t}function token(){return localStorage.getItem(KEY)||''}function saveToken(){localStorage.setItem(KEY,$('token').value.trim());loadAll()}async function api(action,payload={}){const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','x-admin-token':token()},body:JSON.stringify({action,...payload})});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.error||'Erro no painel');return data}async function loadAll(){try{$('token').value=token();const d=await api('listDevices');const p=await api('listPlaylists');devices=d.devices||[];playlists=p.playlists||[];render();msg('Painel carregado.')}catch(e){msg(e.message,false)}}function dateInput(v){if(!v)return'';const d=new Date(v);return isNaN(d.getTime())?'':d.toISOString().slice(0,10)}function render(){$('devices').innerHTML=devices.map(d=>{const opts=['<option value="">Sem lista</option>'].concat(playlists.map(p=>`<option value="${esc(p.id)}" ${p.id===d.playlistId?'selected':''}>${esc(p.name)}</option>`)).join('');return `<tr><td class="mono">${esc(d.deviceCode)}</td><td><input id="name-${d.id}" value="${esc(d.clientName||'')}" placeholder="Cliente"></td><td><select id="status-${d.id}">${['pending','active','blocked','expired','inactive'].map(s=>`<option value="${s}" ${s===d.status?'selected':''}>${s}</option>`).join('')}</select></td><td><select id="playlist-${d.id}">${opts}</select></td><td><input id="exp-${d.id}" type="date" value="${dateInput(d.expiresAt)}"></td><td><button class="green" onclick="saveDevice('${d.id}')">Salvar</button> <button class="red" onclick="blockDevice('${d.id}')">Bloquear</button></td></tr>`}).join('')||'<tr><td colspan="6">Nenhum aparelho.</td></tr>'}async function saveDevice(id){try{const exp=$(`exp-${id}`).value;await api('updateDevice',{id,clientName:$(`name-${id}`).value,status:$(`status-${id}`).value,playlistId:$(`playlist-${id}`).value,expiresAt:exp?new Date(exp+'T23:59:59').toISOString():''});await loadAll();msg('Aparelho salvo.')}catch(e){msg(e.message,false)}}async function blockDevice(id){try{await api('updateDevice',{id,status:'blocked'});await loadAll();msg('Aparelho bloqueado.')}catch(e){msg(e.message,false)}}async function createPlaylist(){try{await api('createPlaylist',{name:$('plName').value.trim(),playlistUrl:$('plUrl').value.trim(),playlistType:$('plType').value,active:true});$('plName').value='';$('plUrl').value='';await loadAll();msg('Playlist criada.')}catch(e){msg(e.message,false)}}$('token').value=token();if(token())loadAll();
</script></body></html>
