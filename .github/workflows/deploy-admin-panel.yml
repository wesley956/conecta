name: Deploy Admin Panel to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "admin-panel/**"
      - ".github/workflows/deploy-admin-panel.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static files
        run: |
          test -f admin-panel/index.html
          touch admin-panel/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload admin panel
        uses: actions/upload-pages-artifact@v3
        with:
          path: admin-panel

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
