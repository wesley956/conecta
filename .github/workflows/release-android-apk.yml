name: Release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-android:
    name: Build and publish Android APK
    runs-on: ubuntu-latest

    env:
      VITE_ENABLE_DEVICE_PANEL: ${{ vars.VITE_ENABLE_DEVICE_PANEL || 'false' }}
      VITE_DEVICE_CONFIG_URL: ${{ vars.VITE_DEVICE_CONFIG_URL || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Prepare Android SDK
        shell: bash
        run: |
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"

          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | head -n 1)"
          fi

          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Verify web build
        run: npm run verify

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Prepare Roneca launcher icon
        run: node scripts/prepare-roneca-icon.cjs

      - name: Generate Android assets
        run: npx -y @capacitor/assets generate --android

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Force Android landscape
        run: node scripts/force-android-landscape.cjs

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Prepare release asset
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/RonecaPlayTV-${TAG_NAME}-debug.apk"
          ls -lh release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RonecaPlayTV ${{ github.ref_name }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: release/*.apk
